<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Giveaway Seite</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #5865F2, #2C2F33);
      color: white;
      text-align: center;
    }

    header { padding: 2rem; }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(0,0,0,0.3);
      padding: 2rem;
      border-radius: 15px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #57F287;
      cursor: pointer;
      font-weight: bold;
    }

    .disabled {
      background: gray;
      cursor: not-allowed;
    }

    .winner { margin-top: 20px; color: gold; }
    .timer { margin: 15px 0; font-size: 1.2rem; }
  </style>
</head>
<body>

<header>
  <h1>🎉 Discord Giveaway 🎉</h1>
  <p>Teilnahme nur mit Code!</p>
</header>

<div class="container">
  <h2>Teilnehmen</h2>
  <input type="text" id="nameInput" placeholder="Dein Discord Name"><br>
  <input type="text" id="codeInput" placeholder="Teilnahme-Code"><br>
  <button id="joinBtn" onclick="addParticipant()">Teilnehmen</button>

  <div class="timer" id="timer"></div>

  <h3>Teilnehmer:</h3>
  <ul id="list"></ul>

  <button onclick="pickWinner()">Gewinner ziehen 🎲</button>
  <div class="winner" id="winner"></div>
</div>

<script>
  let participants = [];

  // >>> HIER DEIN CODE <<<
  const validCode = "GIVEAWAY2026";

  // Timer: 24h ab Seitenstart
  const endTime = new Date().getTime() + (24 * 60 * 60 * 1000);

  function updateTimer() {
    const now = new Date().getTime();
    const distance = endTime - now;

    if (distance <= 0) {
      document.getElementById("timer").textContent = "⛔ Giveaway beendet";
      document.getElementById("joinBtn").disabled = true;
      document.getElementById("joinBtn").classList.add("disabled");
      return;
    }

    const hours = Math.floor(distance / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("timer").textContent = `⏳ ${hours}h ${minutes}m ${seconds}s`;
  }

  setInterval(updateTimer, 1000);

  function addParticipant() {
    const name = document.getElementById('nameInput').value.trim();
    const code = document.getElementById('codeInput').value.trim();

    if (name === '' || code === '') return;

    if (code !== validCode) {
      alert("Falscher Code!");
      return;
    }

    participants.push(name);

    const li = document.createElement('li');
    li.textContent = name;
    document.getElementById('list').appendChild(li);

    document.getElementById('nameInput').value = '';
    document.getElementById('codeInput').value = '';
  }

  function pickWinner() {
    if (participants.length === 0) return;

    const winner = participants[Math.floor(Math.random() * participants.length)];
    document.getElementById('winner').textContent = "🏆 Gewinner: " + winner;
  }
</script>

</body>
</html>
